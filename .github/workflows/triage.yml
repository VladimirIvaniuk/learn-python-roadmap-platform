name: Triage

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'needs-triage', color: 'BFDADC', description: 'Needs initial triage' },
              { name: 'frontend', color: '1D76DB', description: 'Frontend related' },
              { name: 'dependencies', color: '0366D6', description: 'Dependency updates' },
              { name: 'security', color: 'B60205', description: 'Security related' },
              { name: 'bug', color: 'D73A4A', description: 'Something is not working' },
              { name: 'enhancement', color: 'A2EEEF', description: 'New feature or request' }
            ]
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                })
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  })
                } else {
                  throw err
                }
              }
            }

      - name: Add base triage label
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload.issue.number
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['needs-triage'],
            })

      - name: Add contextual labels for issue title
        if: ${{ github.event_name == 'issues' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || '').toLowerCase()
            const labels = []
            if (title.includes('[bug]')) labels.push('bug')
            if (title.includes('[feature]')) labels.push('enhancement')
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels,
              })
            }

      - name: Add frontend label for frontend PRs
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.pull_request.number
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              per_page: 100,
            })
            const touchesFrontend = files.some((file) => file.filename.startsWith('web/frontend/'))
            if (touchesFrontend) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull_number,
                labels: ['frontend'],
              })
            }
